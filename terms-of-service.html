<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Service - Hamro Gunaso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .legal-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 2.5rem;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .legal-container h1 {
            font-size: 2.2rem;
            margin-bottom: 2rem;
            color: var(--secondary);
            opacity: 1;
        }

        .legal-container p {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            opacity: 1;
            line-height: 1.6;
            color: var(--text-dark);
        }

        .back-btn-container {
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="legal-container">
            <div class="back-btn-container">
                <a href="/" class="outline-btn" style="text-decoration: none; display: inline-block;">&larr; Return to
                    Home</a>
            </div>

            <h1>Terms of Service</h1>
            <p>Users are responsible for their posts. Admins reserve the right to delete vulgar, illegal, or harmful
                content to maintain civic decorum.</p>
        </div>
    </div>

</html>
